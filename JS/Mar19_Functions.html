<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Functions in JS</title>
</head>
<body>
    <script>
        //Promises
        let myPromise = new Promise(function(resolve, reject){
            let age  = 25;
            if(age>=18)
            {
            resolve("Valid Age");
            }
        else{
            reject("Not a Valid Age");
        }
        });
        myPromise.then(msg=>console.log(msg)).catch(error=>console.log(error));
        console.log(myPromise);

        // Async Await
        //Api ==> Application Programming Index....
        // JSON ==> Java Script Object Notation

        async function userInfo(){

        try{
            let userData = await fetch('https://dummyjson.com/products');
        let response = await userData.json();
        console.log(response);
        }
        
        catch(error)
        {
            console.log(error);
        }
    }
        userInfo();

        //High Order Functions
        let num = [4,6,7,8,9,3,2,1];

        //map
        let square = num.map(n => n*n);
        console.log(square);
        //reduce
        let sum = num.reduce((total,n)=>total+n);
        console.log(sum);
        //filter
        let sorting = num.filter(n=> n>2);
        console.log(sorting);
        //forEach
        num.forEach(n=>console.log(n*2));

        // Local Storage :- 
        let myInfo = {
             name : "Pushpendra",
             age : "20",
             clg : "ABES",
             branch : "CSE"
        }
        //Store the object by converting it to a JSON string
        localStorage.setItem('myInfo', JSON.stringify(myInfo));
        let storageData = JSON.parse(localStorage.getItem('myInfo'));
        console.log(storeData.name);

    </script>
    
</body>
</html>
