<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loops in JS</title>
</head>
<body>
    <script>
    //Types of Loops
    let studentList = [["Pushpendra", 20], "Pooja", "Khushbu", 23,25];
    //For Loop
    for(let i =0; i<studentList.length;i++)
    {
        console.log(studentList[i]);
    }
//While Loop
    let i =0;
    while(i<=studentList.length)
    {
        console.log(studentList[2]);
        i++;
    }
    //for of
    for(let x of studentList)
    {
        console.log(studentList[1]);
    }


    </script>
    
</body>
</html>
